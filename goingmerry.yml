---
- name: Configure goingmerry Raspberry Pi 5 home server
  hosts: goingmerry
  vars_files:
    - vars/main.yml
    - vars/vault.yml

  pre_tasks:
    - name: Install required Ansible collections
      command: ansible-galaxy collection install -r {{ playbook_dir }}/requirements.yml
      changed_when: false

  roles:
    - system
    - users
    - dotfiles
    - docker
    - storage
    - nordvpn
    - monitoring
    - media
    - caddy
