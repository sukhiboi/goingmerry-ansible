---
- name: Install ext4 support tools
  apt:
    name:
      - e2fsprogs
    state: present

- name: Create mount points for drives
  file:
    path: "{{ item.mount }}"
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_data_group }}"
    mode: "0775"
  loop: "{{ storage_drives }}"

- name: Add drives to fstab
  mount:
    path: "{{ item.mount }}"
    src: "UUID={{ item.uuid }}"
    fstype: "{{ item.fstype }}"
    opts: "defaults,nofail,noatime"
    state: mounted
  loop: "{{ storage_drives }}"

- name: Ensure correct ownership on mount roots
  file:
    path: "{{ item.mount }}"
    owner: "{{ media_user }}"
    group: "{{ media_data_group }}"
    mode: "2775"
  loop: "{{ storage_drives }}"

- name: Create directory structure on onepiece drive (hdd1)
  file:
    path: "{{ hdd1_mount }}/{{ item }}"
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_data_group }}"
    mode: "2775"
  loop:
    - downloads
    - downloads/complete
    - media
    - media/anime
    - media/anime/one-piece

- name: Create directory structure on library drive (hdd2)
  file:
    path: "{{ hdd2_mount }}/{{ item }}"
    state: directory
    owner: "{{ media_user }}"
    group: "{{ media_data_group }}"
    mode: "2775"
  loop:
    - downloads
    - downloads/complete
    - downloads/complete/movies
    - downloads/complete/tv
    - media
    - media/movies
    - media/tv
    - photos