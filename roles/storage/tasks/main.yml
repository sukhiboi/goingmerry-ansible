---
- name: Get media user UID
  getent:
    database: passwd
    key: media
  register: media_passwd

- name: Get media-data group GID
  getent:
    database: group
    key: media-data
  register: media_data_group

- name: Set media UID and GID facts
  set_fact:
    media_uid_resolved: "{{ media_passwd.ansible_facts.getent_passwd.media[1] }}"
    media_gid_resolved: "{{ media_data_group.ansible_facts.getent_group['media-data'][1] }}"

- name: Install exfat support
  apt:
    name:
      - exfatprogs
      - fuse
    state: present

- name: Create mount points for drives
  file:
    path: "{{ item.mount }}"
    state: directory
    mode: "0775"
  loop: "{{ storage_drives }}"

- name: Add drives to fstab
  mount:
    path: "{{ item.mount }}"
    src: "UUID={{ item.uuid }}"
    fstype: "{{ item.fstype }}"
    opts: "uid={{ media_uid_resolved }},gid={{ media_gid_resolved }},umask=002,defaults,nofail"
    state: mounted
  loop: "{{ storage_drives }}"

- name: Ensure correct ownership on mount roots
  file:
    path: "{{ item.mount }}"
    owner: media
    group: media-data
    mode: "0775"
  loop: "{{ storage_drives }}"

