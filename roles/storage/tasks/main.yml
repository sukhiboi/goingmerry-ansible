---
- name: Get media user UID
  getent:
    database: passwd
    key: media
  register: media_passwd

- name: Get media-data group GID
  getent:
    database: group
    key: media-data
  register: media_data_group

- name: Set media UID and GID facts
  set_fact:
    media_uid_resolved: "{{ media_passwd.ansible_facts.getent_passwd.media[1] }}"
    media_gid_resolved: "{{ media_data_group.ansible_facts.getent_group['media-data'][1] }}"

- name: Install exfat support
  apt:
    name:
      - exfatprogs
      - fuse
    state: present

- name: Create mount point for external drive
  file:
    path: "{{ external_drive_mount }}"
    state: directory
    mode: "0775"

- name: Add external drive to fstab
  mount:
    path: "{{ external_drive_mount }}"
    src: "UUID={{ external_drive_uuid }}"
    fstype: exfat
    opts: "uid={{ media_uid_resolved }},gid={{ media_gid_resolved }},umask=002,defaults,nofail"
    state: mounted

- name: Create media directories on external drive
  file:
    path: "{{ external_drive_mount }}/{{ item }}"
    state: directory
    owner: media
    group: media-data
    mode: "0775"
  loop:
    - Shows
    - Movies
    - qbittorrent/completed
    - qbittorrent/in-progress
    - torrents

- name: Ensure correct ownership on mount root
  file:
    path: "{{ external_drive_mount }}"
    owner: media
    group: media-data
    mode: "0775"
