---
- name: Get media user UID
  getent:
    database: passwd
    key: media
  register: media_passwd

- name: Get media-data group GID
  getent:
    database: group
    key: media-data
  register: media_data_group

- name: Set media UID and GID facts
  set_fact:
    media_uid_resolved: "{{ media_passwd.ansible_facts.getent_passwd.media[1] }}"
    media_gid_resolved: "{{ media_data_group.ansible_facts.getent_group['media-data'][1] }}"

- name: Create media compose directory
  file:
    path: "{{ media_compose_dir }}"
    state: directory
    owner: media
    group: media
    mode: "0750"

- name: Deploy media docker-compose.yml
  template:
    src: docker-compose.yml.j2
    dest: "{{ media_compose_dir }}/docker-compose.yml"
    owner: media
    group: media
    mode: "0640"
  notify: restart media stack

# 1. Start stack initially
- name: Start media stack
  community.docker.docker_compose_v2:
    project_src: "{{ media_compose_dir }}"
    state: present
  become: true

- name: Wait for qBittorrent WebUI to be ready
  command: docker exec qbittorrent curl -s -o /dev/null -w "%{http_code}" http://localhost:8080
  register: qbt_ready
  retries: 15
  delay: 5
  until: qbt_ready.stdout == '200'
  become: true
  changed_when: false

- name: Get qBittorrent temporary password from logs
  shell: docker logs qbittorrent 2>&1 | grep 'temporary password' | awk '{print $NF}'
  register: qbt_temp_password
  become: true
  changed_when: false

- name: Login to qBittorrent with temp password
  command: >
    docker exec qbittorrent curl -s -c /tmp/qbt_cookies.txt
    -d 'username=admin&password={{ qbt_temp_password.stdout }}'
    http://localhost:8080/api/v2/auth/login
  register: qbt_login
  become: true
  when: qbt_temp_password.stdout != ''

- name: Set qBittorrent new password
  command: >
    docker exec qbittorrent curl -s -b /tmp/qbt_cookies.txt
    -d 'json={"web_ui_username":"{{ qbittorrent_username }}","web_ui_password":"{{ qbittorrent_password }}"}'
    http://localhost:8080/api/v2/app/setPreferences
  become: true
  when: qbt_temp_password.stdout != ''

# 2. Check all backups
- name: Check sonarr backup exists
  stat:
    path: "{{ backup_base }}/sonarr-config"
  register: sonarr_backup

- name: Check radarr backup exists
  stat:
    path: "{{ backup_base }}/radarr-config"
  register: radarr_backup

- name: Check prowlarr backup exists
  stat:
    path: "{{ backup_base }}/prowlarr-config"
  register: prowlarr_backup

- name: Check jellyfin backup exists
  stat:
    path: "{{ backup_base }}/jellyfin-config"
  register: jellyfin_backup

# 3. Stop stack if any backup exists
- name: Stop media stack for restores
  community.docker.docker_compose_v2:
    project_src: "{{ media_compose_dir }}"
    state: stopped
  become: true
  when: >
    sonarr_backup.stat.exists or
    radarr_backup.stat.exists or
    prowlarr_backup.stat.exists or
    jellyfin_backup.stat.exists

# 4-7. Restore configs
- name: Restore sonarr config from backup
  copy:
    src: "{{ backup_base }}/sonarr-config/"
    dest: /var/lib/docker/volumes/media_sonarr-config/_data/
    owner: "{{ media_uid_resolved }}"
    group: "{{ media_gid_resolved }}"
    mode: preserve
  become: true
  when: sonarr_backup.stat.exists

- name: Restore radarr config from backup
  copy:
    src: "{{ backup_base }}/radarr-config/"
    dest: /var/lib/docker/volumes/media_radarr-config/_data/
    owner: "{{ media_uid_resolved }}"
    group: "{{ media_gid_resolved }}"
    mode: preserve
  become: true
  when: radarr_backup.stat.exists

- name: Restore prowlarr config from backup
  copy:
    src: "{{ backup_base }}/prowlarr-config/"
    dest: /var/lib/docker/volumes/media_prowlarr-config/_data/
    owner: "{{ media_uid_resolved }}"
    group: "{{ media_gid_resolved }}"
    mode: preserve
  become: true
  when: prowlarr_backup.stat.exists

- name: Restore jellyfin config from backup
  copy:
    src: "{{ backup_base }}/jellyfin-config/"
    dest: /var/lib/docker/volumes/media_jellyfin-config/_data/
    owner: "{{ media_uid_resolved }}"
    group: "{{ media_gid_resolved }}"
    mode: preserve
  become: true
  when: jellyfin_backup.stat.exists

# 8. Start stack after restores
- name: Start media stack after restores
  community.docker.docker_compose_v2:
    project_src: "{{ media_compose_dir }}"
    state: present
  become: true
  when: >
    sonarr_backup.stat.exists or
    radarr_backup.stat.exists or
    prowlarr_backup.stat.exists or
    jellyfin_backup.stat.exists

# 9. Update qBittorrent hostname in Sonarr
- name: Update qBittorrent hostname in Sonarr database
  command: >
    sqlite3 /var/lib/docker/volumes/media_sonarr-config/_data/sonarr.db
    "UPDATE DownloadClients SET Settings = REPLACE(Settings, '\"host\": \"goingmerry\"', '\"host\": \"qbittorrent\"')"
  become: true
  when: sonarr_backup.stat.exists

# 10. Update qBittorrent hostname in Radarr
- name: Update qBittorrent hostname in Radarr database
  command: >
    sqlite3 /var/lib/docker/volumes/media_radarr-config/_data/radarr.db
    "UPDATE DownloadClients SET Settings = REPLACE(Settings, '\"host\": \"goingmerry\"', '\"host\": \"qbittorrent\"')"
  become: true
  when: radarr_backup.stat.exists

# 11. Update qBittorrent password in Sonarr
- name: Update qBittorrent password in Sonarr database
  command: >
    sqlite3 /var/lib/docker/volumes/media_sonarr-config/_data/sonarr.db
    "UPDATE DownloadClients SET Settings = json_set(Settings, '$.password', '{{ qbittorrent_password }}') WHERE Implementation = 'QBittorrent'"
  become: true
  when: sonarr_backup.stat.exists

# 12. Update qBittorrent password in Radarr
- name: Update qBittorrent password in Radarr database
  command: >
    sqlite3 /var/lib/docker/volumes/media_radarr-config/_data/radarr.db
    "UPDATE DownloadClients SET Settings = json_set(Settings, '$.password', '{{ qbittorrent_password }}') WHERE Implementation = 'QBittorrent'"
  become: true
  when: radarr_backup.stat.exists

# 13. Update Sonarr root folder path
- name: Update Sonarr root folder path
  command: >
    sqlite3 /var/lib/docker/volumes/media_sonarr-config/_data/sonarr.db
    "UPDATE RootFolders SET Path = '/tv' WHERE Path != '/tv'"
  become: true
  when: sonarr_backup.stat.exists

# 14. Update Radarr root folder path
- name: Update Radarr root folder path
  command: >
    sqlite3 /var/lib/docker/volumes/media_radarr-config/_data/radarr.db
    "UPDATE RootFolders SET Path = '/movies' WHERE Path != '/movies'"
  become: true
  when: radarr_backup.stat.exists

# 15. Restart stack to pick up config changes
- name: Restart media stack to apply config changes
  community.docker.docker_compose_v2:
    project_src: "{{ media_compose_dir }}"
    state: restarted
  become: true
  when: >
    sonarr_backup.stat.exists or
    radarr_backup.stat.exists or
    prowlarr_backup.stat.exists or
    jellyfin_backup.stat.exists
