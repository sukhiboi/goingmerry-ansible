---
- name: Check if NordVPN is already installed
  command: which nordvpn
  register: nordvpn_installed
  changed_when: false
  failed_when: false

- name: Download NordVPN installer
  get_url:
    url: https://downloads.nordcdn.com/apps/linux/install.sh
    dest: /tmp/nordvpn_install.sh
    mode: "0755"
  when: nordvpn_installed.rc != 0

- name: Install NordVPN
  command: sh /tmp/nordvpn_install.sh --no-tty
  when: nordvpn_installed.rc != 0

- name: Enable and start NordVPN daemon
  service:
    name: nordvpnd
    state: started
    enabled: true

- name: Add luffy to nordvpn group
  user:
    name: luffy
    groups: nordvpn
    append: true

- name: Check if already logged in to NordVPN
  command: nordvpn account
  register: nordvpn_account
  failed_when: false
  changed_when: false

- name: Login to NordVPN with token
  shell: echo 'n' | nordvpn login --token {{ nordvpn_token }}
  register: nordvpn_login
  failed_when: false
  changed_when: "'welcome' in nordvpn_login.stdout | lower"
  when: "'not logged in' in nordvpn_account.stdout | lower or 'you are not' in nordvpn_account.stdout | lower"

- name: Set NordVPN lan-discovery
  command: nordvpn set lan-discovery enable
  failed_when: false
  changed_when: false

- name: Enable autoconnect
  command: nordvpn set autoconnect on
  failed_when: false
  changed_when: false

- name: Connect to NordVPN
  command: nordvpn connect
  register: nordvpn_connect
  changed_when: "'connected' in nordvpn_connect.stdout | lower"
  failed_when: false
